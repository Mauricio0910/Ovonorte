<script>

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ============================================
// VARIÁVEIS GLOBAIS

let usuarioAtual = null;
let perfilUsuarioAtual = null;

function usuarioEhAdmin() {
  const p = perfilUsuarioAtual || {};
  return p.funcao === 'diretor'
    || p.funcao === 'admin'
    || p.perfil === 'admin'
    || p.tipo === 'admin'
    || p.admin === true
    || p.isAdmin === true
    || p.role === 'admin';
}

function exigirAdmin(acao = 'acessar esta área') {
  if (usuarioEhAdmin()) return true;
  notificar(`⛔ Apenas administrador/diretor pode ${acao}.`, 'error');
  return false;
}


const COLECOES_OPERACIONAIS_PADRAO = [

// ============================================
// FUNÇÕES AUXILIARES
// ============================================

function formatarMoeda(v) {
  return 'R$ ' + (v || 0).toFixed(2).replace('.', ',');
}

function formatarData(d) {
  if (!d) return '—';
  let p = d.split('-');
  return `${p[2]}/${p[1]}/${p[0]}`;
}

function notificar(msg, tipo = 'info') {
  let n = document.getElementById('notificacao');
  n.textContent = msg;
  n.style.display = 'block';
  n.style.borderLeft = tipo === 'error' ? '4px solid var(--vermelho)' : '4px solid var(--verde)';
  setTimeout(() => n.style.display = 'none', 4000);
}

function hojeISO() {
  // Data local no formato YYYY-MM-DD, evitando deslocamento por UTC.
  const agora = new Date();
  const local = new Date(agora.getTime() - agora.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0, 10);
}

function escapeHtml(valor) {
  return String(valor ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function escapeJs(valor) {
  return String(valor ?? '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\r?\n/g, ' ');
}

function botaoExcluir(colecao, id, descricao) {
  return `<button class="btn-danger btn-small" onclick="excluirRegistro('${colecao}', '${escapeJs(id)}', '${escapeJs(descricao)}')">🗑️ Excluir</button>`;
}

function atualizarStatusFirebase(ok, detalhe = '') {
  const el = document.getElementById('firebaseStatus');
  if (!el) return;
  el.textContent = ok ? 'Firebase: conectado' : 'Firebase: erro';
  el.style.background = ok ? 'var(--verde-bg)' : '#fde8e6';
  el.title = detalhe || '';
}

// ============================================
// AUTENTICAÇÃO
// ============================================

function mostrarCadastro() {
  const email = prompt('Digite seu e-mail para cadastro:');
  if (!email) return;
  const senha = prompt('Digite sua senha (mínimo 6 caracteres):');
  if (!senha || senha.length < 6) {
    alert('Senha deve ter no mínimo 6 caracteres');
    return;
  }

  auth.createUserWithEmailAndPassword(email, senha)
    .then(userCredential => {
      const user = userCredential.user;
      // Criar documento do usuário no Firestore
      db.collection('usuarios').doc(user.uid).set({
        nome: email.split('@')[0],
        email: email,
        funcao: 'colaborador',
        criadoEm: new Date().toISOString()
      })
      .then(() => {
        alert('✅ Cadastro realizado com sucesso! Faça login.');
      })
      .catch(error => {
        alert('❌ Erro ao criar perfil: ' + error.message);
      });
    })
    .catch(error => {
      alert('❌ Erro no cadastro: ' + error.message);
    });
}

function fazerLogin() {
  let email = document.getElementById('emailInput').value.trim();
  let senha = document.getElementById('senhaInput').value;

  if (!email || !senha) {
    mostrarErro('Preencha e-mail e senha');
    return;
  }

  auth.signInWithEmailAndPassword(email, senha)
    .then(userCredential => {
      usuarioAtual = userCredential.user;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'grid';
      iniciarApp();
    })
    .catch(error => {
      mostrarErro('E-mail ou senha incorretos');
      console.error(error);
    });
}

function mostrarErro(msg) {
  let err = document.getElementById('erroMsg');
  err.textContent = msg;
  err.style.display = 'block';
  setTimeout(() => err.style.display = 'none', 3000);
}

function fazerLogout() {
  auth.signOut().then(() => {
    usuarioAtual = null;
    document.getElementById('appScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';

async function getTotalAves() {
  try {
    const snapshot = await db.collection('aves')
      .where('usuarioId', '==', usuarioAtual.uid)
      .get();
    
    let total = 0;
    snapshot.forEach(doc => {
      const a = doc.data();
      if (a.tipo === 'entrada') total += a.quantidade;
      else total -= a.quantidade;
    });

    const mortSnapshot = await db.collection('mortalidades')
      .where('usuarioId', '==', usuarioAtual.uid)
      .get();
    
    let mortes = 0;
    mortSnapshot.forEach(doc => mortes += (doc.data().qtd || 0));
    
    return Math.max(0, total - mortes);
  } catch (e) {
    console.error(e);
    return 0;
  }
}

async function getTotalOvos() {
  try {
    const snapshot = await db.collection('ovos')
      .where('usuarioId', '==', usuarioAtual.uid)
      .get();
    
    let total = 0;
    snapshot.forEach(doc => {
      const o = doc.data();
      total += (o.inteiros || 0) + (o.trincados || 0);
    });
    return total;
  } catch (e) {
    console.error(e);
    return 0;
  }
}

async function getTotalCustos() {
  try {
    const snapshot = await db.collection('custos')
      .where('usuarioId', '==', usuarioAtual.uid)
      .get();
    
    let total = 0;
    snapshot.forEach(doc => total += (doc.data().valor || 0));
    return total;
  } catch (e) {
    console.error(e);
    return 0;
  }
}

async function carregarDados(colecao) {
  try {
    const snapshot = await db.collection(colecao)
      .where('usuarioId', '==', usuarioAtual.uid)
      .orderBy('data', 'desc')
      .get();

    const lista = [];
    snapshot.forEach(doc => {
      lista.push({ id: doc.id, ...doc.data() });
    });
    atualizarStatusFirebase(true);
    return lista;
  } catch (e) {
    console.warn(`Consulta com orderBy falhou em ${colecao}. Tentando sem ordenação.`, e);

    try {
      // Fallback: evita tela vazia quando falta índice composto no Firestore.
      const snapshot = await db.collection(colecao)
        .where('usuarioId', '==', usuarioAtual.uid)
        .get();

      const lista = [];
      snapshot.forEach(doc => {
        lista.push({ id: doc.id, ...doc.data() });
      });
      lista.sort((a, b) => String(b.data || '').localeCompare(String(a.data || '')));
      atualizarStatusFirebase(true);
      return lista;
    } catch (erroFallback) {
      console.error(`Erro ao carregar ${colecao}:`, erroFallback);
      atualizarStatusFirebase(false, erroFallback.message);
      return [];
    }
  }
}

async function salvarDado(colecao, dados) {
  try {
    dados.usuarioId = usuarioAtual.uid;
    dados.criadoEm = new Date().toISOString();
    const ref = await db.collection(colecao).add(dados);
    atualizarStatusFirebase(true);
    return ref;
  } catch (e) {
    console.error(`Erro ao salvar em ${colecao}:`, e);
    atualizarStatusFirebase(false, e.message);
    return null;
  }
}

function obterColecoesManutencao() {
  const campo = document.getElementById('colecoesLimpeza');
  const base = campo ? campo.value : COLECOES_OPERACIONAIS_PADRAO.join('\n');

  return [...new Set(
    base
      .split(/[\n,;]+/)
      .map(item => item.trim())
      .filter(Boolean)
      .filter(item => /^[A-Za-z0-9_-]+$/.test(item))
      .filter(item => item !== 'usuarios')
  )];
}

function valoresPossiveisUsuarioAtual() {
  if (!usuarioAtual) return [];
  return [...new Set([
    usuarioAtual.uid,
    usuarioAtual.email,
    perfilUsuarioAtual?.email,
    perfilUsuarioAtual?.nome,
    perfilUsuarioAtual?.id,
    perfilUsuarioAtual?.uid
  ].filter(Boolean))];
}

async function apagarSnapshotEmLote(snapshot) {
  if (snapshot.empty) return 0;

  const batch = db.batch();
  snapshot.docs.forEach(doc => batch.delete(doc.ref));
  await batch.commit();
  return snapshot.size;
}

async function apagarConsultaEmLotes(criarConsulta, tamanhoLote = 400) {
  let total = 0;

  while (true) {
    const snapshot = await criarConsulta().limit(tamanhoLote).get();
    if (snapshot.empty) break;

    total += await apagarSnapshotEmLote(snapshot);
    if (snapshot.size < tamanhoLote) break;
  }

  return total;
}

async function contarConsultaSegura(criarConsulta, tamanhoLote = 500) {
  const snapshot = await criarConsulta().limit(tamanhoLote).get();
  return snapshot.size;
}

async function apagarColecaoPorUsuario(colecao) {
  let total = 0;
  const erros = [];
  const valoresUsuario = valoresPossiveisUsuarioAtual();

  for (const campo of CAMPOS_DONO_DOCUMENTO) {
    for (const valor of valoresUsuario) {
      try {
        total += await apagarConsultaEmLotes(() =>
          db.collection(colecao).where(campo, '==', valor)
        );
      } catch (e) {
        // Ignora erros de campo/regra nesta varredura para continuar testando outras possibilidades.
        erros.push(`${campo}: ${e.message}`);
      }
    }
  }

  return { total, erros };
}

async function apagarColecaoInteira(colecao) {
  return apagarConsultaEmLotes(() => db.collection(colecao));
}

async function apagarGrupoDeSubcolecao(colecao) {
  if (typeof db.collectionGroup !== 'function') return 0;
  return apagarConsultaEmLotes(() => db.collectionGroup(colecao));
}

async function apagarColecaoPorDataHoje(colecao, dataISO) {
  let total = 0;
  const erros = [];
  const valoresUsuario = valoresPossiveisUsuarioAtual();

  for (const campoData of CAMPOS_DATA_DOCUMENTO) {
    try {
      total += await apagarConsultaEmLotes(() =>
        db.collection(colecao).where(campoData, '==', dataISO)
      );
    } catch (e) {
      erros.push(`${campoData}: ${e.message}`);
    }

    for (const campoDono of CAMPOS_DONO_DOCUMENTO) {
      for (const valorUsuario of valoresUsuario) {
        try {
          total += await apagarConsultaEmLotes(() =>
            db.collection(colecao)
              .where(campoData, '==', dataISO)
              .where(campoDono, '==', valorUsuario)
          );
        } catch (e) {
          erros.push(`${campoData}+${campoDono}: ${e.message}`);
        }
      }
    }
  }

  return { total, erros };
}

async function excluirCustosVinculados(origemColecao, origemId) {
  try {
    let total = 0;

    // Custos novos gravados pela versão corrigida.
    total += await apagarConsultaEmLotes(() =>
      db.collection('custos')
        .where('usuarioId', '==', usuarioAtual.uid)
        .where('origemColecao', '==', origemColecao)
        .where('origemId', '==', origemId)
    );

    // Custos antigos podem ter sido gravados sem usuarioId.
    total += await apagarConsultaEmLotes(() =>
      db.collection('custos')
        .where('origemColecao', '==', origemColecao)
        .where('origemId', '==', origemId)
    );

    total += await apagarConsultaEmLotes(() =>
      db.collection('custos')
        .where('referenciaColecao', '==', origemColecao)
        .where('referenciaId', '==', origemId)
    );

    return total;
  } catch (e) {
    console.warn('Não foi possível remover custos vinculados:', e);
    return 0;
  }
}

async function excluirRegistro(colecao, id, descricao) {
  if (!usuarioAtual || !id || !colecao) return;

  const ok = confirm(`Confirma excluir este registro de ${descricao || colecao}?`);
  if (!ok) return;

  try {
    await db.collection(colecao).doc(id).delete();

    // Remove custos automáticos vinculados a registros novos e antigos.
    if (colecao !== 'custos') {
      await excluirCustosVinculados(colecao, id);
    }

    notificar('✅ Registro excluído com sucesso!');
    atualizarStatusFirebase(true);
    await atualizarResumoTopo();
    mostrarPagina(paginaAtual);
  } catch (e) {
    console.error('Erro ao excluir:', e);
    atualizarStatusFirebase(false, e.message);
    notificar(`❌ Erro ao excluir: ${e.message}`, 'error');
  }
}

async function atualizarResumoTopo() {

  const aves = await getTotalAves();

  document.getElementById('infoAves').innerHTML = `🐔 ${aves} aves | ${ovos} ovos`;

async function apagarLancamentosHoje() {
  if (!usuarioAtual) return;
  if (!exigirAdmin('apagar lançamentos')) return;

  const data = hojeISO();
  const confirmar = confirm(`Apagar todos os lançamentos do dia ${formatarData(data)} nas coleções operacionais?`);
  if (!confirmar) return;

  let total = 0;
  const resultado = [];

  for (const colecao of COLECOES_OPERACIONAIS_PADRAO) {

      const r = await apagarColecaoPorDataHoje(colecao, data);

      resultado.push(`✅ ${colecao}: ${r.total}`);

      resultado.push(`❌ ${colecao}: ${e.message}`);

  }

  notificar(`✅ ${total} lançamento(s) de hoje apagado(s).`);
  await atualizarResumoTopo();
  mostrarPagina('dashboard');
}

async function limparBaseOperacional(apagarTudo = false) {
  if (!usuarioAtual) return;
  if (!exigirAdmin('limpar a base')) return;

  const colecoes = obterColecoesManutencao();
  if (!colecoes.length) {
    notificar('⚠️ Informe pelo menos uma coleção para limpeza.', 'error');
    return;
  }

  const textoConfirmacao = apagarTudo ? 'ZERAR BASE' : 'LIMPAR MEUS DADOS';
  const mensagem = apagarTudo
    ? `ATENÇÃO: isso apagará TODOS os documentos das coleções listadas e tentará também subcoleções com esses nomes. Digite ${textoConfirmacao} para continuar.`
    : `Isso tentará apagar documentos do usuário logado usando vários campos possíveis: usuarioId, userId, uid, email etc. Digite ${textoConfirmacao} para continuar.`;

  const digitado = prompt(mensagem);
  if (digitado !== textoConfirmacao) {
    notificar('Operação cancelada.');
    return;
  }

  const resultado = [];
  let total = 0;

  for (const colecao of colecoes) {
    try {
      let qtd = 0;

      if (apagarTudo) {
        qtd += await apagarColecaoInteira(colecao);
        qtd += await apagarGrupoDeSubcolecao(colecao);
      } else {
        const r = await apagarColecaoPorUsuario(colecao);
        qtd += r.total;
      }

      total += qtd;
      resultado.push(`✅ ${colecao}: ${qtd}`);
    } catch (e) {
      resultado.push(`❌ ${colecao}: ${e.message}`);
    }
  }

  const saida = document.getElementById('resultadoLimpeza');
  if (saida) {
    saida.innerHTML = `
      <strong>Resultado da limpeza:</strong><br>
      ${resultado.map(linha => escapeHtml(linha)).join('<br>')}
      <br><br><strong>Total apagado:</strong> ${total}
      <br><br>
      <small>
        Se uma coleção aparecer com erro de permissão, a regra do Firestore está bloqueando exclusão desses documentos pelo usuário atual.
        Nesse caso, use uma conta administradora ou apague pela Console do Firebase.
      </small>
    `;
  }

  notificar(`✅ Limpeza concluída. ${total} registro(s) apagado(s).`);
  await atualizarResumoTopo();
}

async function limparHistoricosRevendasCustos() {
  if (!usuarioAtual) return;
  if (!exigirAdmin('apagar históricos de teste')) return;

  const confirmar = prompt(
    'Esta rotina apaga especialmente custos, vendas, revendas e históricos em várias variações de nome. Digite APAGAR TESTES para continuar.'
  );

  if (confirmar !== 'APAGAR TESTES') {
    notificar('Operação cancelada.');
    return;
  }

  const resultado = [];
  let total = 0;

  for (const colecao of COLECOES_LIMPEZA_CRITICA) {
    try {
      let qtd = 0;

      // Primeiro tenta apagar tudo, para alcançar dados de teste sem usuarioId.
      try {
        qtd += await apagarColecaoInteira(colecao);
      } catch (e) {
        // Se a regra bloquear apagar tudo, tenta pelos campos de usuário.
        const parcial = await apagarColecaoPorUsuario(colecao);
        qtd += parcial.total;
      }

      // Também tenta subcoleções com os mesmos nomes.
      try {
        qtd += await apagarGrupoDeSubcolecao(colecao);
      } catch (e) {
        // Subcoleção bloqueada ou inexistente: segue para a próxima.
      }

      total += qtd;
      resultado.push(`✅ ${colecao}: ${qtd}`);
    } catch (e) {
      resultado.push(`❌ ${colecao}: ${e.message}`);
    }
  }

  const saida = document.getElementById('resultadoLimpeza');
  if (saida) {
    saida.innerHTML = `
      <strong>Resultado da limpeza crítica:</strong><br>
      ${resultado.map(linha => escapeHtml(linha)).join('<br>')}
      <br><br><strong>Total apagado:</strong> ${total}
    `;
  }

  notificar(`✅ Limpeza crítica concluída. ${total} registro(s) apagado(s).`);
  await atualizarResumoTopo();
}

async function diagnosticarColecoes() {
  if (!usuarioAtual) return;
  if (!exigirAdmin('diagnosticar coleções')) return;

  const colecoes = obterColecoesManutencao();
  const resultado = [];

  for (const colecao of colecoes) {
    try {
      const qtd = await contarConsultaSegura(() => db.collection(colecao));
      resultado.push(`📁 ${colecao}: ${qtd} documento(s) visível(is)`);
    } catch (e) {
      resultado.push(`⚠️ ${colecao}: ${e.message}`);
    }
  }

  const saida = document.getElementById('resultadoLimpeza');
  if (saida) {
    saida.innerHTML = `
      <strong>Diagnóstico das coleções listadas:</strong><br>
      ${resultado.map(linha => escapeHtml(linha)).join('<br>')}
      <br><br>
      <small>O diagnóstico só mostra documentos que as regras do Firestore permitem ler com o usuário atual.</small>
    `;
  }
}

let paginaAtual = 'dashboard';

function mostrarPagina(pagina, botao = null) {
  if ((pagina === 'manutencao' || pagina === 'usuarios') && !exigirAdmin('acessar esta área')) {
    pagina = 'dashboard';
    botao = null;
  }

  paginaAtual = pagina;
  document.querySelectorAll('#menuSuperior button').forEach(btn => {
    btn.classList.remove('ativo');
    if (!botao && btn.dataset.pagina === pagina) btn.classList.add('ativo');
  });
  if (botao) botao.classList.add('ativo');

  const titulos = {
    dashboard: '📊 Painel de Controle',
    aves: '🐔 Controle de Aves',
    ovos: '🥚 Coleta de Ovos',
    racao: '🌾 Ração e Água',
    medicacao: '💊 Medicação',
    mortalidade: '⚠️ Mortalidade',
    custos: '💰 Custos e Despesas',
    'custo-unitario': '📈 Custo Unitário',
    relatorios: '📄 Relatórios',
    usuarios: '👤 Usuários',
    manutencao: '🧹 Manutenção da Base'
  };

  document.getElementById('tituloPagina').textContent = titulos[pagina] || 'OVONORTE';

  const container = document.getElementById('conteudoArea');
  container.innerHTML = '<div class="loading">Carregando...</div>';

  if (pagina === 'dashboard') renderDashboard(container);
  else if (pagina === 'aves') renderAves(container);
  else if (pagina === 'ovos') renderOvos(container);
  else if (pagina === 'racao') renderRacao(container);
  else if (pagina === 'medicacao') renderMedicacao(container);
  else if (pagina === 'mortalidade') renderMortalidade(container);
  else if (pagina === 'custos') renderCustos(container);
  else if (pagina === 'custo-unitario') renderCustoUnitario(container);
  else if (pagina === 'relatorios') renderRelatorios(container);
  else if (pagina === 'usuarios') renderUsuarios(container);
  else if (pagina === 'manutencao') renderManutencao(container);
}

async function renderDashboard(container) {
  const aves = await getTotalAves();
  const ovos = await getTotalOvos();
  const custos = await getTotalCustos();
  
  const hoje = hojeISO();
  const mesInicio = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
  
  // Buscar ovos do mês
  let ovosMes = 0;
  try {
    const snapshot = await db.collection('ovos')
      .where('usuarioId', '==', usuarioAtual.uid)
      .where('data', '>=', mesInicio)
      .get();
    snapshot.forEach(doc => {
      const o = doc.data();
      ovosMes += (o.inteiros || 0) + (o.trincados || 0);
    });
  } catch (e) {}

  // Buscar custos do mês
  let custosMes = 0;
  try {
    const snapshot = await db.collection('custos')
      .where('usuarioId', '==', usuarioAtual.uid)
      .where('data', '>=', mesInicio)
      .get();
    snapshot.forEach(doc => custosMes += (doc.data().valor || 0));
  } catch (e) {}

  const custoPorAve = aves > 0 ? custosMes / aves : 0;
  const custoPorOvo = ovosMes > 0 ? custosMes / ovosMes : 0;
  
  // Buscar últimos lançamentos
  let recentes = [];
  try {
    const snap = await db.collection('ovos')
      .where('usuarioId', '==', usuarioAtual.uid)
      .orderBy('data', 'desc')
      .limit(5)
      .get();
    snap.forEach(doc => {
      const o = doc.data();
      recentes.push({ data: o.data, tipo: 'Coleta de Ovos', valor: `${(o.inteiros||0)+(o.trincados||0)} ovos` });
    });
    
    const snap2 = await db.collection('custos')
      .where('usuarioId', '==', usuarioAtual.uid)
      .orderBy('data', 'desc')
      .limit(5)
      .get();
    snap2.forEach(doc => {
      const c = doc.data();
      recentes.push({ data: c.data, tipo: c.descricao, valor: formatarMoeda(c.valor) });
    });
    recentes.sort((a,b) => b.data.localeCompare(a.data));
    recentes = recentes.slice(0, 8);
  } catch (e) {}

  container.innerHTML = `
    <div class="kpis">
      <div class="kpi"><div class="kpi-label">Aves Ativas</div><div class="kpi-valor">${aves}</div></div>
      <div class="kpi"><div class="kpi-label">Total Ovos</div><div class="kpi-valor">${ovos}</div></div>
      <div class="kpi"><div class="kpi-label">Total Custos</div><div class="kpi-valor">${formatarMoeda(custos)}</div></div>
      <div class="kpi"><div class="kpi-label">Custo por Ave</div><div class="kpi-valor">${formatarMoeda(custoPorAve)}</div></div>
      <div class="kpi"><div class="kpi-label">Custo por Ovo</div><div class="kpi-valor">${formatarMoeda(custoPorOvo)}</div></div>
      <div class="kpi"><div class="kpi-label">Ovos no Mês</div><div class="kpi-valor">${ovosMes}</div></div>
    </div>
    
    <div class="card">

async function renderRacao(container) {

          <div class="campo"><label>📌 Tipo de Ração</label><select id="raTipo"><option>Postura Fase 1</option><option>Postura Fase 2</option><option>Crescimento</option></select></div>
          <div class="campo"><label>⚖️ Quantidade (kg)</label><input type="number" id="raKg" step="0.1" value="0"></div>
          <div class="campo"><label>💰 Custo Ração (R$)</label><input type="number" id="raCusto" step="0.01" value="0"></div>
          <div class="campo"><label>💧 Água (L)</label><input type="number" id="aguaL" step="0.1" value="0"></div>
          <div class="campo"><label>💰 Custo Água (R$)</label><input type="number" id="aguaCusto" step="0.01" value="0"></div>
          <button class="btn-primary" onclick="salvarRacao()">✅ Registrar Consumo</button>
        </div>
      </div>
      <div class="card">
        <h3>📋 Histórico de Consumo</h3>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>Data</th><th>Ração</th><th>Custo</th><th>Custo/Ave</th><th>Ações</th></tr></thead>
            <tbody>
              ${lista.length === 0 ? '<tr><td colspan="5" style="text-align:center; color:#888;">Nenhum consumo</td></tr>' :
              lista.map(r => {
                const custoTotal = (r.raCusto||0) + (r.aguaCusto||0);
                const custoPorAve = aves > 0 ? custoTotal/aves : 0;
                return `<tr><td>${formatarData(r.data)}</td><td>${(r.raKg||0).toFixed(1)} kg</td><td>${formatarMoeda(custoTotal)}</td><td>${formatarMoeda(custoPorAve)}</td><td class="acoes">${botaoExcluir('racoes', r.id, 'consumo de ração/água')}</td></tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

async function salvarRacao() {
  const data = document.getElementById('raData').value;
  const raTipo = document.getElementById('raTipo').value;
  const raKg = parseFloat(document.getElementById('raKg').value) || 0;
  const raCusto = parseFloat(document.getElementById('raCusto').value) || 0;
  const aguaL = parseFloat(document.getElementById('aguaL').value) || 0;
  const aguaCusto = parseFloat(document.getElementById('aguaCusto').value) || 0;

  if (raKg === 0 && aguaL === 0) {
    notificar('⚠️ Informe pelo menos um consumo');
    return;
  }

  const registroRef = await salvarDado('racoes', { data, tipo: raTipo, raKg, raCusto, aguaL, aguaCusto });
  if (!registroRef) {
    notificar('❌ Erro ao registrar', 'error');
    return;
  }

  // Registrar custos separadamente, vinculando à origem para exclusão futura.
  if (raCusto > 0) {
    await db.collection('custos').add({
      data,
      descricao: `Ração ${raTipo} (${raKg}kg)`,
      valor: raCusto,
      usuarioId: usuarioAtual.uid,
      origemColecao: 'racoes',
      origemId: registroRef.id,
      criadoEm: new Date().toISOString()
    });
  }
  if (aguaCusto > 0) {
    await db.collection('custos').add({
      data,
      descricao: `Água (${aguaL}L)`,
      valor: aguaCusto,
      usuarioId: usuarioAtual.uid,
      origemColecao: 'racoes',
      origemId: registroRef.id,
      criadoEm: new Date().toISOString()
    });
  }

  notificar('✅ Consumo registrado com sucesso!');
  document.getElementById('raKg').value = '0';
  document.getElementById('raCusto').value = '0';
  document.getElementById('aguaL').value = '0';
  document.getElementById('aguaCusto').value = '0';
  mostrarPagina('racao');
}

        <div class="kpi"><div class="kpi-label">Custo por Ave</div><div class="kpi-valor">${aves > 0 ? formatarMoeda(totalCustos/aves) : 'R$ 0'}</div></div>
        <div class="kpi"><div class="kpi-label">Custo por Ovo</div><div class="kpi-valor">${totalOvos > 0 ? formatarMoeda(totalCustos/totalOvos) : 'R$ 0'}</div></div>
      </div>
      <button class="btn-primary" onclick="window.print()" style="width:auto;">🖨️ Imprimir Relatório</button>
    </div>
  `;
}

// ============================================
// MANUTENÇÃO DA BASE
// ============================================

async function renderManutencao(container) {
  if (!exigirAdmin('acessar a manutenção')) {
    container.innerHTML = '<div class="card"><h3>⛔ Acesso restrito</h3><p>Esta área é exclusiva do administrador/diretor.</p></div>';
    return;
  }
  const colecoesPadrao = COLECOES_OPERACIONAIS_PADRAO.join('\n');

  container.innerHTML = `
    <div class="card">
      <h3>🧹 Limpeza de dados de teste e históricos</h3>
      <div class="admin-only-note">Área restrita: somente administrador/diretor visualiza e executa estas rotinas.</div>
      <p>
        Use esta área para apagar dados fictícios gerados durante o desenvolvimento, incluindo históricos de vendas/revendas,
        produção, custos, aves, ração, medicações e mortalidade.
      </p>
      <p style="margin-top:10px; color:#a93226;">
        <strong>Atenção:</strong> esta rotina não apaga o login do Firebase Auth e não inclui a coleção <code>usuarios</code> por padrão,
        para você não perder acesso ao sistema.
      </p>

      <div class="campo" style="margin-top:16px;">
        <label>Coleções que serão limpas</label>
        <textarea id="colecoesLimpeza" rows="14">${colecoesPadrao}</textarea>
      </div>

      <div style="margin-top:16px; display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn-secondary" onclick="diagnosticarColecoes()">🔎 Diagnosticar coleções visíveis</button>
        <button class="btn-secondary" onclick="limparBaseOperacional(false)">🧹 Limpar dados do usuário logado</button>
        <button class="btn-danger" onclick="limparHistoricosRevendasCustos()">🔥 Apagar históricos/revendas/custos de teste</button>
        <button class="btn-danger" onclick="limparBaseOperacional(true)">⚠️ Zerar completamente as coleções listadas</button>
      </div>

      <div style="margin-top:16px; background:#fff8e1; padding:14px; border-radius:8px;">
        <p><strong>Quando usar cada opção:</strong></p>
        <p>• <strong>Diagnosticar:</strong> mostra quantos documentos o usuário logado consegue ler em cada coleção listada.</p>
        <p>• <strong>Limpar dados do usuário logado:</strong> tenta apagar por <code>usuarioId</code>, <code>userId</code>, <code>uid</code>, <code>email</code> e outros campos comuns.</p>
        <p>• <strong>Apagar históricos/revendas/custos:</strong> rotina específica para dados antigos de teste, inclusive documentos sem <code>usuarioId</code>, se a regra permitir.</p>
        <p>• <strong>Zerar completamente:</strong> apaga todos os documentos das coleções listadas e também tenta subcoleções com esses nomes.</p>
        <p>• Se ainda sobrar dado, copie exatamente o nome da coleção no Firebase Console e acrescente na lista acima. O Firestore diferencia maiúsculas/minúsculas.</p>
      </div>

      <div id="resultadoLimpeza" style="margin-top:16px; background:var(--verde-bg); padding:14px; border-radius:8px; display:block; max-height:420px; overflow:auto;">
        Nenhuma limpeza executada nesta sessão.
      </div>
    </div>
  `;
}

// ============================================
// USUÁRIOS (APENAS ADMIN)
// ============================================

async function renderUsuarios(container) {
  if (!exigirAdmin('acessar usuários')) {
    container.innerHTML = '<div class="card"><h3>⛔ Acesso restrito</h3><p>Esta área é exclusiva do administrador/diretor.</p></div>';
    return;
  }
  // Buscar todos os usuários (apenas admin pode ver)
  let usuarios = [];
  try {
    const snapshot = await db.collection('usuarios').get();
    snapshot.forEach(doc => {
      usuarios.push({ id: doc.id, ...doc.data() });
    });
  } catch (e) {
    console.error(e);
  }
  
  container.innerHTML = `
    <div class="grid2">
      <div class="card">
        <h3>👤 Cadastrar Usuário</h3>
        <div class="formulario">
          <div class="campo"><label>👤 Nome Completo</label><input type="text" id="userNome" placeholder="Nome completo"></div>
          <div class="campo"><label>📧 E-mail</label><input type="email" id="userEmail" placeholder="email@exemplo.com"></div>
          <div class="campo"><label>🔒 Senha</label><input type="password" id="userSenha" placeholder="Mínimo 6 caracteres"></div>
          <div class="campo"><label>👔 Função</label><select id="userFuncao"><option value="colaborador">Colaborador</option><option value="diretor">Diretor</option></select></div>
          <button class="btn-primary" onclick="salvarUsuarioFirebase()">✅ Cadastrar Usuário</button>
        </div>
      </div>
      <div class="card">
        <h3>📋 Usuários Cadastrados</h3>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>Nome</th><th>E-mail</th><th>Função</th></tr></thead>
            <tbody>
              ${usuarios.length === 0 ? '<tr><td colspan="3" style="text-align:center; color:#888;">Nenhum usuário</td></tr>' :
              usuarios.map(u => `<tr><td><strong>${u.nome || '—'}</strong></td><td>${u.email}</td><td>${u.funcao === 'diretor' ? '👑 Diretor' : '👤 Colaborador'}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

async function salvarUsuarioFirebase() {
  const nome = document.getElementById('userNome').value;
  const email = document.getElementById('userEmail').value;
  const senha = document.getElementById('userSenha').value;
  const funcao = document.getElementById('userFuncao').value;
  
  if (!nome || !email || !senha) {
    notificar('⚠️ Preencha todos os campos');
    return;
  }
  if (senha.length < 6) {
    notificar('⚠️ Senha mínima 6 caracteres');
    return;
  }
  
  try {
    // Criar usuário no Authentication
    const userCredential = await auth.createUserWithEmailAndPassword(email, senha);
    const user = userCredential.user;
    
    // Salvar no Firestore
    await db.collection('usuarios').doc(user.uid).set({
      nome,
      email,
      funcao,
      criadoEm: new Date().toISOString()
    });
    
    notificar('✅ Usuário cadastrado com sucesso!');
    document.getElementById('userNome').value = '';
    document.getElementById('userEmail').value = '';
    document.getElementById('userSenha').value = '';
    mostrarPagina('usuarios');
  } catch (error) {
    notificar('❌ Erro ao cadastrar: ' + error.message, 'error');
  }
}

    iniciarApp();

});
